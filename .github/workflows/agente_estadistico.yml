name: Agente Estadístico Autonómo

on:
  schedule:
    - cron: "15 * * * *" # Se ejecuta en el minuto 15 de cada hora
  workflow_dispatch: # Permite ejecución manual

jobs:
  run_agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3
        
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests bs4 pytz
          
      - name: Ejecutar Agente Estadístico
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          POLLINATIONS_ENABLED: "true"
        run: |
          python3 agente_estadistico.py
          
      - name: Guardar historial estadístico (Caché)
        # Commit de los cambios en .cache/stats_history.json para que el agente tenga memoria
        run: |
          git config --global user.name "AgenteEstadistico-Bot"
          git config --global user.email "bot@pasionypelota.com"
          git add .cache/stats_history.json
          git diff --staged --quiet || git commit -m "Update stats history cache"
          git push
