name: Publish News Bot

on:
  schedule:
    - cron: '0 0,4,12,16,20 * * *'        # Runs 5 times a day (at 21:00, 01:00, 09:00, 13:00, 17:00 Buenos Aires time)
  workflow_dispatch:              # Allows manual triggering

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper & Publisher
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TZ: America/Argentina/Buenos_Aires
        run: |
          python main_standalone.py --mode publish


      - name: Commit and Push Database Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          CHANGED=""
          if git status --porcelain | grep -q "database.json"; then
            git add database.json
            CHANGED="database.json"
          fi
          if git status --porcelain | grep -q "used_images.json"; then
            git add used_images.json
            CHANGED="$CHANGED used_images.json"
          fi
          
          if [ -n "$CHANGED" ]; then
            echo "Archivos actualizados: $CHANGED. Commiteando cambios..."
            git commit -m "Auto-update [$CHANGED] [skip ci]"
            git pull --rebase
            git push
          else
            echo "No hay actualizaciones en database.json ni used_images.json."
          fi
