name: Publish News Bot

on:
  schedule:
    - cron: '0,30 * * * *'      # Runs every 30 minutes
  workflow_dispatch:           # Allows manual triggering

jobs:
  publish-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper & Publisher
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python main_standalone.py --mode publish

      - name: Commit and Push Database Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if git status --porcelain | grep -q "database.json"; then
            echo "Database updated. Committing changes..."
            git add database.json
            git commit -m "Auto-update database.json [skip ci]"
            git push
          else
            echo "No database updates."
          fi
